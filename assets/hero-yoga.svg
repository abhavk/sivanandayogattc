<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100" role="img" aria-labelledby="title desc">
  <title id="title">Sunrise yoga practice</title>
  <desc id="desc">A warm abstract illustration of a seated yoga practitioner before a rising sun.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff4d6"/>
      <stop offset=".45" stop-color="#f4a51c"/>
      <stop offset="1" stop-color="#596d3d"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="40%" r="36%">
      <stop offset="0" stop-color="#fff9ed"/>
      <stop offset=".48" stop-color="#ffcf55"/>
      <stop offset="1" stop-color="#b83b24"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".7" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .18"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="900" height="1100" fill="url(#sky)"/>
  <rect width="900" height="1100" filter="url(#grain)" opacity=".45"/>
  <circle cx="450" cy="374" r="265" fill="url(#sun)" opacity=".92"/>
